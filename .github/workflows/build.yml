name: Build epub

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build epub
        run: pwsh -File build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epub
          path: "build/Cosmos DB - The Good Parts.epub"

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "build/Cosmos DB - The Good Parts.epub"
